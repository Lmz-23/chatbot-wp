name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script_stop: true
          script: |
            set -e

            echo "=== Entrando al proyecto ==="
            cd "${{ secrets.EC2_PROJECT_PATH }}"

            echo "=== Guardando commit actual ==="
            PREV_HEAD=$(git rev-parse HEAD)

            echo "=== Haciendo git pull ==="
            git pull origin main

            echo "=== Guardando nuevo commit ==="
            NEW_HEAD=$(git rev-parse HEAD)

            echo "=== Revisando cambios en package.json ==="
            if git diff --name-only "$PREV_HEAD" "$NEW_HEAD" | grep -Eq '(^|/)package\.json$'; then
              echo "package.json changed -> running npm install --production"
              npm install --production
            else
              echo "package.json unchanged -> skipping npm install"
            fi

            echo "=== Verificando PM2 ==="
            /usr/bin/pm2 list

            echo "=== Haciendo restart ==="
            /usr/bin/pm2 restart replai-backend

            echo "=== Verificando estado ==="
            /usr/bin/pm2 list

            echo "=== Guardando estado PM2 ==="
            /usr/bin/pm2 save

            echo "=== Deploy completado ==="
