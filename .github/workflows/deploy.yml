name: Deploy Backend to EC2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener IP publica del runner
        id: runner_ip
        run: |
          set -e
          RUNNER_IP="$(curl -s https://checkip.amazonaws.com | tr -d '[:space:]')"
          echo "Runner IP: ${RUNNER_IP}"
          echo "ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"

      - name: Abrir SSH temporal en Security Group
        run: |
          set -e
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.runner_ip.outputs.ip }}/32,Description=GitHubActionsTemporarySSH}]"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script_stop: true
          script: |
            set -e

            echo "=== Entrando al proyecto ==="
            cd "${{ secrets.EC2_PROJECT_PATH }}"

            echo "=== Sincronizando repositorio con origin/main ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Instalando dependencias de produccion ==="
            npm install --production

            echo "=== Verificando PM2 ==="
            /usr/bin/pm2 list

            echo "=== Haciendo restart ==="
            /usr/bin/pm2 restart replai-backend

            echo "=== Verificando estado ==="
            /usr/bin/pm2 list

            echo "=== Guardando estado PM2 ==="
            /usr/bin/pm2 save

            echo "=== Deploy completado ==="

      - name: Cerrar SSH temporal en Security Group
        if: always()
        run: |
          set -e
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.AWS_SECURITY_GROUP_ID }}" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.runner_ip.outputs.ip }}/32}]" || true
